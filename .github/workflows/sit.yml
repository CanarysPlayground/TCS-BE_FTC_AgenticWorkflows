name: SIT

on:
  workflow_call:
    inputs:
      target_branch:
        required: true
        type: string

      #run_scm:
        #required: true
        #type: boolean

      #run_sast:
        #required: true
        #type: boolean

jobs:
  sit:
    runs-on: ubuntu-latest
    environment: SIT

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Display Branch Information
        run: |
          echo "Workflow Branch: ${{ github.ref_name }}"
          echo "Selected Branch: ${{ inputs.target_branch }}"


      - name: SCM
        if: ${{ inputs.run_scm }}
        uses: ./.github/actions/scm

      - name: SAST
        if: ${{ inputs.run_sast }}
        uses: ./.github/actions/sast

      - name: Start Application
        run: |
          npm install
          node app.js &
          sleep 10

      - name: Checkout Functional Tests
        uses: actions/checkout@v4
        with:
          ref: katalon
          path: katalon

      - name: Smoke Test
        continue-on-error: true
        run: |
          chmod +x katalon/smoke-tests/smoke-test.sh
          ./katalon/smoke-tests/smoke-test.sh

      - name: Upload Smoke Log
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: smoke.log

      - name: Create Issue on Smoke Failure
        if: steps.smoke.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Smoke Test Failure",
              body: "Smoke test failed during SIT execution."
            })

      - name: Product Test
        run: |
          chmod +x katalon/product-tests/product-test.sh
          ./katalon/product-tests/product-test.sh

      - name: Navigation Test
        run: |
          chmod +x katalon/navigation-tests/navigation-test.sh
          ./katalon/navigation-tests/navigation-test.sh

      - name: Generate Functional Report
        run: |
          IFS=',' read ST SP SF < smoke-result.txt
          IFS=',' read PT PP PF < product-result.txt
          IFS=',' read NT NP NF < navigation-result.txt

          TOTAL=$((ST + PT + NT))
          PASSED=$((SP + PP + NP))
          FAILED=$((SF + PF + NF))

          echo "=================================="
          echo "Functional Testing Summary"
          echo "=================================="
          echo "Total Tests : $TOTAL"
          echo "Passed      : $PASSED"
          echo "Failed      : $FAILED"
          echo "=================================="

          echo "TestSuite,Total,Passed,Failed" > functional-report.csv
          echo "Smoke,$ST,$SP,$SF" >> functional-report.csv
          echo "Product,$PT,$PP,$PF" >> functional-report.csv
          echo "Navigation,$NT,$NP,$NF" >> functional-report.csv
          echo "Overall,$TOTAL,$PASSED,$FAILED" >> functional-report.csv

          cat functional-report.csv

      - name: Upload Functional Report
        uses: actions/upload-artifact@v4
        with:
          name: functional-test-report
          path: functional-report.csv
      
      - name: Install Dependencies
        run: npm install

      - name: Validate App
        run: node --check app.js

      - name: Verify Files
        run: |
          ls -la
          test -f app.js
          test -f package.json
