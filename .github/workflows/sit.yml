name: SIT

on:
  workflow_call:
    inputs:
      target_branch:
        required: true
        type: string

jobs:
  sit:
    runs-on: ubuntu-latest
    environment: SIT

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Install Dependencies
        run: npm install

      - name: Validate App
        run: node --check app.js

      - name: Verify Files
        run: |
          ls -la
          test -f app.js
          test -f package.json
