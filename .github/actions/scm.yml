name: SCM Validation

runs:
  using: composite

  steps:
    - name: Verify Repository Structure
      shell: bash
      run: |
        echo "Checking repository structure..."
        ls -la

    - name: Verify Required Files
      shell: bash
      run: |
        test -f app.js
        test -f package.json

    - name: Show Commit Details
      shell: bash
      run: |
        git log -1 --oneline
